name: Sync TuneCore

on:
  schedule:
    - cron: "0 21 * * *" # 毎日 06:00 JST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync TuneCore releases
        run: python scripts/sync_tunecore.py

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes."
            exit 0
          fi
          git config user.name "tunecore-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/tracks.json images/jackets index.html
          git commit -m "Sync latest releases from TuneCore"
          git push
